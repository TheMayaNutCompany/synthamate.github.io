<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="x-ua-compatible" content="ie=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Top Menu Language Test | The MayaNut Company</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Marcellus&display=swap" rel="stylesheet">

  <style>
    :root{
      --font-display:"Marcellus", Georgia, "Times New Roman", serif;
      --font-ui:"Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;

      --ink:#000;
      --bg:#fff;
      --orange:#ff7000;
      --orange-press:#d95e00;
      --soft-outline:rgba(0,0,0,0.14);

      --headerTopH:78px;
      --headerSubH:38px;
      --headerH:calc(var(--headerTopH) + var(--headerSubH));

      --padX:16px;
      --scrollbarW:0px;

      /* constant language control width */
      --langTriggerW:84px;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      background:#fff;
      color:#000;
      max-width:100%;
      overflow-x:hidden;
      font-family:var(--font-ui);
    }

    img, svg{
      display:block;
      max-width:100%;
      height:auto;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button{
      font:inherit;
    }

    a:focus-visible,
    button:focus-visible{
      outline:3px solid rgba(255,112,0,0.9);
      outline-offset:3px;
      border-radius:10px;
    }

    .site-header{
      position:fixed;
      top:0;
      left:0;
      right:var(--scrollbarW);
      z-index:9999;
      background:#fff;
    }

    .header-top,
    .header-bottom{
      width:100%;
      background:#fff;
    }

    .header-top-inner,
    .header-bottom-inner{
      width:100%;
      padding-left:var(--padX);
      padding-right:var(--padX);
      margin:0;
    }

    .header-top-row{
      min-height:var(--headerTopH);
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      align-items:center;
      gap:18px;
    }

    .header-bottom{
      border-top:1px solid rgba(0,0,0,0.14);
      border-bottom:0;
    }

    .header-bottom-row{
      min-height:var(--headerSubH);
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:12px;
      padding-top:2px;
    }

    .brand{
      min-width:0;
      min-height:46px;
      display:flex;
      align-items:center;
    }

    .brand-link{
      display:inline-flex;
      align-items:center;
      gap:12px;
      min-width:0;
      max-width:100%;
    }

    .brand-link img{
      width:46px;
      height:46px;
      object-fit:contain;
      flex:0 0 auto;
    }

    .brand-name{
      display:flex;
      align-items:center;
      min-height:46px;
      min-width:0;
      max-width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-family:var(--font-display);
      font-size:clamp(25px, 2.2vw, 39px);
      font-weight:400;
      letter-spacing:.01em;
      line-height:1;
      color:#000;
    }

    .header-main-actions{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:16px;
      min-width:0;
    }

    .subnav{
      display:flex;
      align-items:center;
      gap:16px;
      flex-wrap:nowrap;
      justify-content:flex-end;
      min-width:0;
      min-height:46px;
    }

    .subnav a{
      position:relative;
      display:inline-flex;
      align-items:center;
      min-height:46px;
      font-size:16px;
      font-weight:500;
      letter-spacing:.03em;
      line-height:1;
      padding:0 2px;
      color:#000;
      white-space:nowrap;
    }

    .subnav a.active{
      color:var(--orange);
    }

    .subnav a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:10px;
      height:2px;
      width:0;
      background:#000;
      transition:width .18s ease, background .12s ease;
    }

    .subnav a:hover::after{
      width:100%;
    }

    .subnav a.active::after{
      width:100%;
      background:var(--orange);
    }

    .header-cart{
      position:relative;
      width:48px;
      height:48px;
      border-radius:15px;
      border:1px solid var(--orange);
      background:var(--orange);
      color:#fff;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:transform .12s ease, background .12s ease, border-color .12s ease;
      overflow:visible;
    }

    .header-cart:hover{
      transform:translateY(-1px);
      background:var(--orange-press);
      border-color:var(--orange-press);
    }

    .header-cart svg{
      width:22px;
      height:22px;
      fill:none;
      stroke:#fff;
      stroke-width:2.2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .cart-badge{
      position:absolute;
      top:-6px;
      right:-6px;
      min-width:20px;
      height:20px;
      padding:0 5px;
      border-radius:999px;
      background:var(--orange);
      color:#fff;
      border:1px solid #fff;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:900;
      line-height:1;
      z-index:3;
      pointer-events:none;
    }

    .header-utility-link{
      justify-self:start;
      display:inline-flex;
      align-items:center;
      gap:7px;
      min-height:28px;
      font-size:13px;
      font-weight:500;
      line-height:1;
      color:#000;
      transition:color .12s ease;
    }

    .header-utility-link svg{
      width:13px;
      height:13px;
      fill:currentColor;
      flex:0 0 auto;
    }

    .header-utility-link:hover,
    .header-utility-link:focus-visible,
    .header-utility-link:active{
      color:var(--orange);
    }

    .header-bottom-spacer{
      min-width:0;
    }

    /* language like Contact, constant width */
    .lang-menu{
      position:relative;
      justify-self:end;
      align-self:center;
      z-index:1002;
      width:var(--langTriggerW);
      transform:translateY(-4px);
    }

    .lang-btn{
      appearance:none;
      border:0;
      background:transparent;
      color:#000;
      font-size:13px;
      font-weight:500;
      line-height:1;
      min-height:28px;
      width:100%;
      padding:0;
      display:grid;
      grid-template-columns:13px 1fr 10px;
      align-items:center;
      column-gap:7px;
      cursor:pointer;
      white-space:nowrap;
      position:relative;
      text-align:left;
    }

    .lang-btn:hover,
    .lang-btn:focus-visible{
      color:var(--orange);
      outline:none;
    }

    /* underline closer to text, same feel as other menu items */
    .lang-btn::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:-3px;
      height:2px;
      background:transparent;
      transition:background .12s ease;
    }

    .lang-btn:hover::after{
      background:#000;
    }

    .lang-btn[aria-expanded="true"]{
      color:var(--orange);
    }

    .lang-btn[aria-expanded="true"]::after{
      background:var(--orange);
    }

    .lang-globe{
      width:13px;
      height:13px;
      fill:currentColor;
      flex:0 0 auto;
    }

    #langBtnLabel{
      color:inherit;
      font-size:13px;
      font-weight:600;
      letter-spacing:.04em;
      white-space:nowrap;
      text-align:left;
    }

    .lang-caret{
      font-size:11px;
      line-height:1;
      transform:translateY(-1px);
      color:currentColor;
      text-align:right;
    }

    /* popup exactly same width as trigger */
    .lang-dropdown{
      position:absolute;
      left:0;
      top:calc(100% + 6px);
      width:100%;
      display:none;
      background:#fff;
      border:1px solid var(--soft-outline);
      border-radius:14px;
      padding:8px;
      z-index:1003;
    }

    .lang-dropdown.open{
      display:block;
    }

    .lang-list{
      display:grid;
      gap:6px;
    }

    /* popup rows are grey straight rectangles */
    .lang-item{
      position:relative;
      display:block;
      width:100%;
      min-height:36px;
      padding:0 10px;
      background:#eceff3;
      border:0;
      border-radius:0;
      color:#000;
      font-size:13px;
      font-weight:700;
      line-height:1;
      letter-spacing:.04em;
      text-align:left;
      display:flex;
      align-items:center;
      justify-content:flex-start;
    }

    .lang-item:hover{
      filter:brightness(0.985);
    }

    .lang-item.active{
      color:var(--orange);
      border:1px solid rgba(255,112,0,0.35);
    }

    main{
      padding-top:calc(var(--headerH) + 20px);
    }

    .test-area{
      padding:24px 16px 60px;
    }

    .bw-box{
      border:1px solid #000;
      padding:20px;
      margin-bottom:18px;
      background:#fff;
      color:#000;
    }

    .bw-box.large{
      min-height:220px;
    }

    @media (max-width:1180px){
      .subnav{ display:none; }
    }

    @media (max-width:760px){
      :root{
        --headerTopH:72px;
        --headerSubH:34px;
        --headerH:calc(var(--headerTopH) + var(--headerSubH));
        --langTriggerW:74px;
      }

      .brand-link img{
        width:42px;
        height:42px;
      }

      .brand-name{
        font-size:clamp(18px, 4.5vw, 22px);
      }

      .header-main-actions{
        gap:10px;
      }

      .header-cart{
        width:44px;
        height:44px;
        border-radius:14px;
      }

      .header-bottom-row{
        gap:10px;
      }

      .header-utility-link{
        font-size:12px;
        gap:6px;
      }

      .lang-menu{
        transform:none;
      }

      .lang-btn,
      #langBtnLabel,
      .lang-item{
        font-size:12px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header" aria-label="Site header">
    <div class="header-top">
      <div class="header-top-inner">
        <div class="header-top-row">
          <div class="brand" aria-label="The MayaNut Company">
            <a href="#" class="brand-link" aria-label="Go to home page">
              <img
                src="/the-mayanut-company-logo-tm.svg"
                alt="The MayaNut Company logo"
                width="46"
                height="46"
                onerror="this.onerror=null;this.src='/the-mayanut-company-logo-tm.png';"
              >
              <span class="brand-name">The MayaNut Company</span>
            </a>
          </div>

          <div class="header-main-actions">
            <nav class="subnav" aria-label="Primary navigation">
              <a href="#">Home</a>
              <a class="active" href="#" aria-current="page">Buy</a>
              <a href="#">About</a>
              <a href="#">FAQ</a>
              <a href="#">Recipes</a>
            </nav>

            <button class="header-cart" type="button" aria-label="Open cart">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="9" cy="20" r="1.5"></circle>
                <circle cx="18" cy="20" r="1.5"></circle>
                <path d="M3 4h2l2.2 10h10.9l1.8-7H6.2"></path>
              </svg>
              <span class="cart-badge" aria-hidden="true">0</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="header-bottom">
      <div class="header-bottom-inner">
        <div class="header-bottom-row">
          <a class="header-utility-link" href="mailto:info@mayanut.com" aria-label="Contact The MayaNut Company by email">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4-8 5L4 8V6l8 5 8-5v2Z"></path>
            </svg>
            <span>Contact</span>
          </a>

          <div class="header-bottom-spacer" aria-hidden="true"></div>

          <div class="lang-menu" id="langMenu">
            <button
              class="lang-btn"
              id="langBtn"
              type="button"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="langDropdown"
              aria-label="Choose language. Current language: English"
            >
              <svg class="lang-globe" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm6.9 9h-3.1a15.9 15.9 0 0 0-1.1-5A8.03 8.03 0 0 1 18.9 11ZM12 4.1c.8 1 1.8 3.1 2.2 6H9.8c.4-2.9 1.4-5 2.2-6ZM9.3 6A15.9 15.9 0 0 0 8.2 11H5.1A8.03 8.03 0 0 1 9.3 6ZM5.1 13h3.1c.2 1.8.6 3.5 1.1 5A8.03 8.03 0 0 1 5.1 13Zm6.9 6.9c-.8-1-1.8-3.1-2.2-6h4.4c-.4 2.9-1.4 5-2.2 6Zm2.7-1.9c.5-1.5.9-3.2 1.1-5h3.1A8.03 8.03 0 0 1 14.7 18Z"/>
              </svg>
              <span id="langBtnLabel">EN</span>
              <span class="lang-caret" aria-hidden="true">▾</span>
            </button>

            <div class="lang-dropdown" id="langDropdown" role="menu" aria-label="Language selector">
              <div class="lang-list">
                <a class="lang-item active" href="#" role="menuitem" data-code="EN">EN</a>
                <a class="lang-item" href="#" role="menuitem" data-code="ES">ES</a>
                <a class="lang-item" href="#" role="menuitem" data-code="FR">FR</a>
                <a class="lang-item" href="#" role="menuitem" data-code="PT">PT</a>
                <a class="lang-item" href="#" role="menuitem" data-code="RU">RU</a>
                <a class="lang-item" href="#" role="menuitem" data-code="ZH">ZH</a>
                <a class="lang-item" href="#" role="menuitem" data-code="HI">HI</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="test-area">
      <div class="bw-box">Black/white test block</div>
      <div class="bw-box large">Extra black/white area for spacing and scroll test</div>
      <div class="bw-box large">Another black/white test block</div>
    </div>
  </main>

  <script>
    (function initLanguageDropdown(){
      const langMenu = document.getElementById("langMenu");
      const langBtn = document.getElementById("langBtn");
      const langDropdown = document.getElementById("langDropdown");
      const langBtnLabel = document.getElementById("langBtnLabel");
      const langItems = Array.from(document.querySelectorAll(".lang-item"));

      if (!langMenu || !langBtn || !langDropdown || !langBtnLabel) return;

      function openLangMenu(){
        langDropdown.classList.add("open");
        langBtn.setAttribute("aria-expanded", "true");
      }

      function closeLangMenu(){
        langDropdown.classList.remove("open");
        langBtn.setAttribute("aria-expanded", "false");
      }

      langBtn.addEventListener("click", function(e){
        e.stopPropagation();
        if (langDropdown.classList.contains("open")) {
          closeLangMenu();
        } else {
          openLangMenu();
        }
      });

      document.addEventListener("click", function(e){
        if (!langMenu.contains(e.target)) closeLangMenu();
      });

      document.addEventListener("keydown", function(e){
        if (e.key === "Escape") closeLangMenu();
      });

      langItems.forEach(function(item){
        item.addEventListener("click", function(e){
          e.preventDefault();
          langItems.forEach(function(i){ i.classList.remove("active"); });
          item.classList.add("active");
          langBtnLabel.textContent = item.dataset.code || item.textContent.trim();
          closeLangMenu();
        });
      });
    })();
  </script>
</body>
</html>
