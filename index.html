<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="x-ua-compatible" content="ie=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Top Menu Test | The MayaNut Company</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Marcellus&display=swap" rel="stylesheet">

  <style>
    :root{
      --font-display:"Marcellus", Georgia, "Times New Roman", serif;
      --font-ui:"Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;

      --ink:#000;
      --bg:#fff;
      --orange:#ff7000;
      --orange-press:#d95e00;
      --soft-gray:#eceff3;
      --panel-outline:rgba(0,0,0,0.14);

      --headerTopH:78px;
      --headerSubH:38px;
      --headerH:calc(var(--headerTopH) + var(--headerSubH));

      --padX:16px;
      --scrollbarW:0px;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      max-width:100%;
      overflow-x:hidden;
      background:#fff;
      color:#000;
      font-family:var(--font-ui);
    }

    body{
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    img, svg{
      display:block;
      max-width:100%;
      height:auto;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button{
      font:inherit;
    }

    a:focus-visible,
    button:focus-visible{
      outline:3px solid rgba(255,112,0,0.9);
      outline-offset:3px;
      border-radius:10px;
    }

    .site-header{
      position:fixed;
      top:0;
      left:0;
      right:var(--scrollbarW);
      z-index:9999;
      background:#fff;
    }

    .header-top,
    .header-bottom{
      width:100%;
      background:#fff;
    }

    .header-top-inner,
    .header-bottom-inner{
      width:100%;
      padding-left:var(--padX);
      padding-right:var(--padX);
      margin:0;
    }

    .header-top-row{
      min-height:var(--headerTopH);
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      align-items:center;
      gap:18px;
    }

    .header-bottom{
      border-top:1px solid rgba(0,0,0,0.14);
      border-bottom:0;
    }

    .header-bottom-row{
      min-height:var(--headerSubH);
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:12px;
      padding-top:2px;
    }

    .brand{
      min-width:0;
      min-height:46px;
      display:flex;
      align-items:center;
    }

    .brand-link{
      display:inline-flex;
      align-items:center;
      gap:12px;
      min-width:0;
      max-width:100%;
    }

    .brand-link img{
      width:46px;
      height:46px;
      object-fit:contain;
      flex:0 0 auto;
    }

    .brand-name{
      display:flex;
      align-items:center;
      min-height:46px;
      min-width:0;
      max-width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-family:var(--font-display);
      font-size:clamp(25px, 2.2vw, 39px);
      font-weight:400;
      letter-spacing:.01em;
      line-height:1;
      color:#000;
    }

    .header-main-actions{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:16px;
      min-width:0;
    }

    .subnav{
      display:flex;
      align-items:center;
      gap:16px;
      flex-wrap:nowrap;
      justify-content:flex-end;
      min-width:0;
      min-height:46px;
    }

    .subnav a{
      position:relative;
      display:inline-flex;
      align-items:center;
      min-height:46px;
      font-size:16px;
      font-weight:500;
      letter-spacing:.03em;
      line-height:1;
      padding:0 2px;
      color:#000;
      white-space:nowrap;
    }

    .subnav a.active{
      color:var(--orange);
    }

    .subnav a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:10px;
      height:2px;
      width:0;
      background:#000;
      transition:width .18s ease, background .12s ease;
    }

    .subnav a:hover::after{
      width:100%;
    }

    .subnav a.active::after{
      width:100%;
      background:var(--orange);
    }

    .header-cart{
      position:relative;
      width:48px;
      height:48px;
      border-radius:15px;
      border:1px solid var(--orange);
      background:var(--orange);
      color:#fff;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:transform .12s ease, background .12s ease, border-color .12s ease;
      overflow:visible;
    }

    .header-cart:hover{
      transform:translateY(-1px);
      background:var(--orange-press);
      border-color:var(--orange-press);
    }

    .header-cart svg{
      width:22px;
      height:22px;
      fill:none;
      stroke:#fff;
      stroke-width:2.2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .cart-badge{
      position:absolute;
      top:-6px;
      right:-6px;
      min-width:20px;
      height:20px;
      padding:0 5px;
      border-radius:999px;
      background:var(--orange);
      color:#fff;
      border:1px solid #fff;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:900;
      line-height:1;
      z-index:3;
      pointer-events:none;
    }

    .header-bottom-spacer{
      min-width:0;
    }

    /* CONTACT */
    .header-utility-link{
      position:relative;
      justify-self:start;
      display:inline-flex;
      align-items:center;
      gap:7px;
      min-height:28px;
      font-size:13px;
      font-weight:500;
      line-height:1;
      color:#000;
      transition:color .12s ease;
    }

    .header-utility-link svg{
      width:13px;
      height:13px;
      fill:currentColor;
      flex:0 0 auto;
    }

    .header-utility-link::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:-3px;
      height:2px;
      background:transparent;
      transition:background .12s ease;
    }

    .header-utility-link:hover::after{
      background:#000;
    }

    .header-utility-link.is-active{
      color:var(--orange);
    }

    .header-utility-link.is-active::after{
      background:var(--orange);
    }

    /* LANGUAGE BUTTON */
    .lang-menu{
      position:relative;
      justify-self:end;
      align-self:center;
      z-index:1002;
      width:auto;
      transform:translateY(-4px);
    }

    .lang-btn{
      appearance:none;
      border:0;
      background:transparent;
      color:#000;
      font-size:13px;
      font-weight:500;
      line-height:1;
      min-height:28px;
      padding:0;
      display:inline-flex;
      align-items:center;
      gap:7px;
      cursor:pointer;
      white-space:nowrap;
      position:relative;
      text-align:left;
    }

    .lang-btn:hover,
    .lang-btn:focus-visible{
      outline:none;
    }

    .lang-btn::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:-3px;
      height:2px;
      background:transparent;
      transition:background .12s ease;
    }

    .lang-btn:hover::after{
      background:#000;
    }

    .lang-btn[aria-expanded="true"]{
      color:var(--orange);
    }

    .lang-btn[aria-expanded="true"]::after{
      background:var(--orange);
    }

    .lang-globe{
      width:13px;
      height:13px;
      fill:currentColor;
      flex:0 0 auto;
    }

    .lang-prefix{
      color:inherit;
      font-size:13px;
      font-weight:500;
      letter-spacing:.01em;
      white-space:nowrap;
    }

    .lang-current{
      color:var(--orange);
      font-size:13px;
      font-weight:600;
      letter-spacing:.01em;
      white-space:nowrap;
    }

    .lang-btn[aria-expanded="true"] .lang-current{
      color:currentColor;
    }

    .lang-caret{
      font-size:11px;
      line-height:1;
      transform:translateY(-1px);
      color:currentColor;
    }

    /* CENTERED POPUP */
    .lang-panel{
      position:fixed;
      top:calc(var(--headerH) + 20px);
      left:50%;
      transform:translateX(-50%);
      width:min(560px, calc(100vw - 32px));
      background:#fff;
      border:1px solid var(--panel-outline);
      border-radius:14px;
      padding:18px 18px 16px;
      display:none;
      z-index:1003;
      box-shadow:0 18px 44px rgba(0,0,0,0.10);
    }

    .lang-panel.open{
      display:block;
    }

    .lang-panel-title{
      margin:0 0 16px 0;
      text-align:center;
      font-size:15px;
      line-height:1.2;
      font-weight:700;
      letter-spacing:.02em;
      color:#000;
    }

    .lang-grid{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:18px;
      align-items:start;
    }

    .lang-col{
      display:grid;
      gap:8px;
    }

    .lang-option{
      position:relative;
      min-height:40px;
      padding:0 12px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      border:0;
      border-radius:0;
      background:#fff;
      color:#000;
      font-size:13px;
      font-weight:600;
      line-height:1;
      cursor:pointer;
      text-align:left;
      transition:background .12s ease, color .12s ease;
    }

    .lang-option:hover{
      background:rgba(0,0,0,0.03);
    }

    .lang-option.active{
      background:var(--soft-gray);
      color:var(--orange);
    }

    .lang-option.active::before{
      content:"";
      position:absolute;
      left:0;
      top:0;
      bottom:0;
      width:3px;
      background:var(--orange);
    }

    main{
      padding-top:calc(var(--headerH) + 20px);
    }

    .test-area{
      padding:24px 16px 60px;
      display:grid;
      gap:18px;
    }

    .bw-box{
      border:1px solid #000;
      padding:20px;
      min-height:160px;
      background:#fff;
      color:#000;
    }

    .bw-box.large{
      min-height:260px;
    }

    @media (max-width:1180px){
      .subnav{ display:none; }
    }

    @media (max-width:760px){
      :root{
        --headerTopH:72px;
        --headerSubH:34px;
        --headerH:calc(var(--headerTopH) + var(--headerSubH));
      }

      .brand-link img{
        width:42px;
        height:42px;
      }

      .brand-name{
        font-size:clamp(18px, 4.5vw, 22px);
      }

      .header-main-actions{
        gap:10px;
      }

      .header-cart{
        width:44px;
        height:44px;
        border-radius:14px;
      }

      .header-bottom-row{
        gap:10px;
      }

      .header-utility-link,
      .lang-prefix,
      .lang-current,
      .lang-btn{
        font-size:12px;
      }

      .lang-menu{
        transform:none;
      }

      .lang-panel{
        width:min(520px, calc(100vw - 20px));
        padding:16px 14px 14px;
      }

      .lang-grid{
        gap:12px;
      }

      .lang-option{
        min-height:38px;
        font-size:12px;
      }
    }

    @media (max-width:560px){
      .lang-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <header class="site-header" aria-label="Site header">
    <div class="header-top">
      <div class="header-top-inner">
        <div class="header-top-row">
          <div class="brand" aria-label="The MayaNut Company">
            <a href="#" class="brand-link" aria-label="Go to home page">
              <img
                src="/the-mayanut-company-logo-tm.svg"
                alt="The MayaNut Company logo"
                width="46"
                height="46"
                onerror="this.onerror=null;this.src='/the-mayanut-company-logo-tm.png';"
              >
              <span class="brand-name">The MayaNut Company</span>
            </a>
          </div>

          <div class="header-main-actions">
            <nav class="subnav" aria-label="Primary navigation">
              <a href="#">Home</a>
              <a class="active" href="#" aria-current="page">Buy</a>
              <a href="#">About</a>
              <a href="#">FAQ</a>
              <a href="#">Recipes</a>
            </nav>

            <button class="header-cart" type="button" aria-label="Open cart">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="9" cy="20" r="1.5"></circle>
                <circle cx="18" cy="20" r="1.5"></circle>
                <path d="M3 4h2l2.2 10h10.9l1.8-7H6.2"></path>
              </svg>
              <span class="cart-badge" aria-hidden="true">0</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="header-bottom">
      <div class="header-bottom-inner">
        <div class="header-bottom-row">
          <a class="header-utility-link" id="contactLink" href="#" aria-label="Contact The MayaNut Company by email">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4-8 5L4 8V6l8 5 8-5v2Z"></path>
            </svg>
            <span>Contact</span>
          </a>

          <div class="header-bottom-spacer" aria-hidden="true"></div>

          <div class="lang-menu" id="langMenu">
            <button
              class="lang-btn"
              id="langBtn"
              type="button"
              aria-haspopup="dialog"
              aria-expanded="false"
              aria-controls="langPanel"
              aria-label="Choose language. Current language: English"
            >
              <svg class="lang-globe" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm6.9 9h-3.1a15.9 15.9 0 0 0-1.1-5A8.03 8.03 0 0 1 18.9 11ZM12 4.1c.8 1 1.8 3.1 2.2 6H9.8c.4-2.9 1.4-5 2.2-6ZM9.3 6A15.9 15.9 0 0 0 8.2 11H5.1A8.03 8.03 0 0 1 9.3 6ZM5.1 13h3.1c.2 1.8.6 3.5 1.1 5A8.03 8.03 0 0 1 5.1 13Zm6.9 6.9c-.8-1-1.8-3.1-2.2-6h4.4c-.4 2.9-1.4 5-2.2 6Zm2.7-1.9c.5-1.5.9-3.2 1.1-5h3.1A8.03 8.03 0 0 1 14.7 18Z"/>
              </svg>
              <span class="lang-prefix">Language:</span>
              <span class="lang-current" id="langCurrent">English</span>
              <span class="lang-caret" aria-hidden="true">▾</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="lang-panel" id="langPanel" role="dialog" aria-modal="false" aria-label="Choose Language">
    <h2 class="lang-panel-title">Choose Language</h2>

    <div class="lang-grid">
      <div class="lang-col">
        <button class="lang-option active" data-language="English" type="button">English</button>
        <button class="lang-option" data-language="Español" type="button">Español</button>
        <button class="lang-option" data-language="Français" type="button">Français</button>
      </div>

      <div class="lang-col">
        <button class="lang-option" data-language="Português" type="button">Português</button>
        <button class="lang-option" data-language="Русский" type="button">Русский</button>
      </div>

      <div class="lang-col">
        <button class="lang-option" data-language="中文" type="button">中文</button>
        <button class="lang-option" data-language="हिन्दी" type="button">हिन्दी</button>
      </div>
    </div>
  </div>

  <main>
    <div class="test-area">
      <div class="bw-box">Black/white test block</div>
      <div class="bw-box large">Extra black/white area for spacing and scroll test</div>
      <div class="bw-box large">Another black/white test block</div>
    </div>
  </main>

  <script>
    (function initMenuTest(){
      const contactLink = document.getElementById("contactLink");
      const langBtn = document.getElementById("langBtn");
      const langPanel = document.getElementById("langPanel");
      const langCurrent = document.getElementById("langCurrent");
      const langOptions = Array.from(document.querySelectorAll(".lang-option"));

      function openLanguagePanel(){
        langPanel.classList.add("open");
        langBtn.setAttribute("aria-expanded", "true");
      }

      function closeLanguagePanel(){
        langPanel.classList.remove("open");
        langBtn.setAttribute("aria-expanded", "false");
      }

      function setActiveLanguage(button){
        langOptions.forEach(function(option){
          option.classList.remove("active");
        });
        button.classList.add("active");
        langCurrent.textContent = button.dataset.language || button.textContent.trim();
      }

      contactLink.addEventListener("click", function(e){
        e.preventDefault();
        contactLink.classList.add("is-active");
        setTimeout(function(){
          contactLink.classList.remove("is-active");
        }, 900);
      });

      langBtn.addEventListener("click", function(e){
        e.stopPropagation();
        contactLink.classList.remove("is-active");
        if (langPanel.classList.contains("open")) {
          closeLanguagePanel();
        } else {
          openLanguagePanel();
        }
      });

      langOptions.forEach(function(option){
        option.addEventListener("click", function(){
          setActiveLanguage(option);
          closeLanguagePanel();
        });
      });

      document.addEventListener("click", function(e){
        const clickedInsideButton = langBtn.contains(e.target);
        const clickedInsidePanel = langPanel.contains(e.target);
        if (!clickedInsideButton && !clickedInsidePanel) {
          closeLanguagePanel();
        }
      });

      document.addEventListener("keydown", function(e){
        if (e.key === "Escape") {
          closeLanguagePanel();
          contactLink.classList.remove("is-active");
        }
      });
    })();
  </script>
</body>
</html>
