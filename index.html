<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social World Prototype</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #111;
    }

    body {
      user-select: none;
    }

    .page {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    #worldPage {
      background: #ff7000;
      overflow: hidden;
    }

    #homePage {
      display: none;
      background: #d91f1f;
      color: #fff;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    #homePage.active {
      display: flex;
    }

    #worldPage.hidden {
      display: none;
    }

    .homeTitle {
      font-size: clamp(32px, 7vw, 72px);
      font-weight: 700;
      letter-spacing: 1px;
    }

    .homeSub {
      font-size: clamp(16px, 2vw, 22px);
      opacity: 0.9;
    }

    .returnBtn {
      border: none;
      border-radius: 999px;
      padding: 14px 26px;
      font-size: 16px;
      cursor: pointer;
      background: #fff;
      color: #d91f1f;
      font-weight: 700;
    }

    #player {
      position: absolute;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #fff;
      left: 200px;
      top: 200px;
      z-index: 2;
    }

    #chatBubble {
      position: absolute;
      left: 8px;
      bottom: 72px;
      max-width: 240px;
      min-width: 60px;
      padding: 10px 14px;
      background: #fff;
      color: #111;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.3;
      display: none;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.16);
      user-select: text;
    }

    #chatBubble::after {
      content: "";
      position: absolute;
      left: 16px;
      bottom: -10px;
      width: 0;
      height: 0;
      border-top: 12px solid #fff;
      border-right: 12px solid transparent;
    }

    .topRightButtons {
      position: fixed;
      top: 18px;
      right: 18px;
      display: flex;
      gap: 12px;
      z-index: 20;
    }

    .iconBtn,
    .mapBtn,
    .closeBtn,
    .navBtn {
      border: none;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.96);
      color: #111;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.16);
    }

    .iconBtn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-size: 22px;
      display: grid;
      place-items: center;
    }

    .mapBtn {
      min-width: 92px;
      height: 52px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      padding: 0 20px;
    }

    .bottomBarWrap {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      width: min(860px, calc(100vw - 32px));
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 20;
    }

    .roundBtn {
      flex: 0 0 56px;
      width: 56px;
      height: 56px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.96);
      color: #111;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    #chatForm {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #chatInput {
      flex: 1;
      height: 56px;
      border: none;
      outline: none;
      border-radius: 999px;
      padding: 0 22px;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.96);
      color: #111;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    #chatInput::placeholder {
      color: #666;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      background: rgba(0, 0, 0, 0.22);
    }

    .overlay.active {
      display: flex;
    }

    #mapPanel {
      width: 80vw;
      height: 80vh;
      max-width: 1200px;
      max-height: 900px;
      background: #6c2bd9;
      border-radius: 30px;
      padding: 28px;
      position: relative;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      color: #fff;
    }

    .panelTitle {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 700;
      margin-bottom: 26px;
    }

    .mapLinks {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-top: 24px;
    }

    .mapLink {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 16px 22px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      text-decoration: none;
      font-size: 22px;
      font-weight: 700;
    }

    .mapLink:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    .closeBtn {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 22px;
    }

    #socialOverlay {
      background: rgba(0, 0, 0, 0.16);
      align-items: stretch;
      justify-content: center;
    }

    #socialPanel {
      width: 66.666vw;
      min-width: 320px;
      max-width: 980px;
      height: 100vh;
      background: #fff;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.18);
      position: relative;
      padding: 24px 24px 32px;
      overflow-y: auto;
    }

    .socialHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .socialTitle {
      font-size: clamp(26px, 3vw, 40px);
      font-weight: 700;
      color: #111;
    }

    .protoCard {
      border: 1px solid #e7e7e7;
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.04);
    }

    .protoName {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #111;
    }

    .protoPost {
      font-size: 15px;
      line-height: 1.45;
      color: #333;
    }

    #friendsPanel {
      position: fixed;
      top: 82px;
      right: 18px;
      width: 260px;
      background: rgba(255, 255, 255, 0.98);
      color: #111;
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
      z-index: 30;
      display: none;
    }

    #friendsPanel.active {
      display: block;
    }

    .friendsTitle {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .friendRow {
      padding: 10px 0;
      border-bottom: 1px solid #ececec;
      font-size: 15px;
    }

    .friendRow:last-child {
      border-bottom: none;
    }

    @media (max-width: 700px) {
      .bottomBarWrap {
        width: calc(100vw - 18px);
        gap: 8px;
      }

      .roundBtn {
        flex-basis: 50px;
        width: 50px;
        height: 50px;
      }

      #chatInput {
        height: 50px;
      }

      #socialPanel {
        width: 86vw;
      }

      #mapPanel {
        width: 90vw;
        height: 82vh;
      }
    }
  </style>
</head>
<body>
  <div id="worldPage" class="page">
    <div class="topRightButtons">
      <button id="mapOpenBtn" class="mapBtn" type="button">Map</button>
      <button id="friendsBtn" class="iconBtn" type="button" aria-label="Friends">☺</button>
    </div>

    <div id="friendsPanel">
      <div class="friendsTitle">Friends</div>
      <div class="friendRow">MayaSky</div>
      <div class="friendRow">OrangeOrbit</div>
      <div class="friendRow">Sunline23</div>
    </div>

    <div id="player">
      <div id="chatBubble"></div>
    </div>

    <div class="bottomBarWrap">
      <button id="homeBtn" class="roundBtn" type="button" aria-label="Home">⌂</button>

      <form id="chatForm" autocomplete="off">
        <input
          id="chatInput"
          type="text"
          placeholder="Type here and press Enter..."
          maxlength="140"
        />
      </form>

      <button id="socialBtn" class="roundBtn" type="button" aria-label="Social">🔍</button>
    </div>
  </div>

  <div id="homePage" class="page">
    <div class="homeTitle">Home</div>
    <div class="homeSub">Red page prototype</div>
    <button id="returnToWorldBtn" class="returnBtn" type="button">Return to World</button>
  </div>

  <div id="mapOverlay" class="overlay">
    <div id="mapPanel">
      <button id="mapCloseBtn" class="closeBtn" type="button" aria-label="Close map">×</button>
      <div class="panelTitle">Map</div>
      <div class="mapLinks">
        <a href="#" class="mapLink" data-map="north-pole">North Pole</a>
        <a href="#" class="mapLink" data-map="desert">Desert</a>
        <a href="#" class="mapLink" data-map="jungle">Jungle</a>
      </div>
    </div>
  </div>

  <div id="socialOverlay" class="overlay">
    <div id="socialPanel">
      <div class="socialHeader">
        <div class="socialTitle">Proto Social Media</div>
        <button id="socialCloseBtn" class="closeBtn" type="button" aria-label="Close social panel">×</button>
      </div>

      <div class="protoCard">
        <div class="protoName">OrangeOrbit</div>
        <div class="protoPost">Late-night lounge energy tonight. Who is on?</div>
      </div>

      <div class="protoCard">
        <div class="protoName">Sunline23</div>
        <div class="protoPost">I want rare jungle items when that map opens.</div>
      </div>

      <div class="protoCard">
        <div class="protoName">MayaSky</div>
        <div class="protoPost">This white panel is the early social feed concept.</div>
      </div>
    </div>
  </div>

  <script>
    const player = document.getElementById("player");
    const chatBubble = document.getElementById("chatBubble");
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");

    const worldPage = document.getElementById("worldPage");
    const homePage = document.getElementById("homePage");
    const homeBtn = document.getElementById("homeBtn");
    const returnToWorldBtn = document.getElementById("returnToWorldBtn");

    const mapOverlay = document.getElementById("mapOverlay");
    const mapOpenBtn = document.getElementById("mapOpenBtn");
    const mapCloseBtn = document.getElementById("mapCloseBtn");

    const socialOverlay = document.getElementById("socialOverlay");
    const socialBtn = document.getElementById("socialBtn");
    const socialCloseBtn = document.getElementById("socialCloseBtn");

    const friendsBtn = document.getElementById("friendsBtn");
    const friendsPanel = document.getElementById("friendsPanel");

    let x = 200;
    let y = 200;
    const size = 56;
    const speed = 220;

    let targetX = x;
    let targetY = y;

    const keys = {};

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function renderPlayer() {
      const maxX = window.innerWidth - size;
      const maxY = window.innerHeight - size;
      x = clamp(x, 0, maxX);
      y = clamp(y, 0, maxY);
      targetX = clamp(targetX, 0, maxX);
      targetY = clamp(targetY, 0, maxY);
      player.style.left = x + "px";
      player.style.top = y + "px";
    }

    function isTyping() {
      return document.activeElement === chatInput;
    }

    function anyOverlayOpen() {
      return mapOverlay.classList.contains("active") ||
             socialOverlay.classList.contains("active") ||
             homePage.classList.contains("active");
    }

    function switchToHome() {
      worldPage.classList.add("hidden");
      homePage.classList.add("active");
      mapOverlay.classList.remove("active");
      socialOverlay.classList.remove("active");
      friendsPanel.classList.remove("active");
    }

    function switchToWorld() {
      worldPage.classList.remove("hidden");
      homePage.classList.remove("active");
    }

    function openMap() {
      mapOverlay.classList.add("active");
      friendsPanel.classList.remove("active");
    }

    function closeMap() {
      mapOverlay.classList.remove("active");
    }

    function openSocial() {
      socialOverlay.classList.add("active");
      friendsPanel.classList.remove("active");
    }

    function closeSocial() {
      socialOverlay.classList.remove("active");
    }

    function toggleFriends() {
      friendsPanel.classList.toggle("active");
    }

    function setMoveTarget(clientX, clientY) {
      targetX = clientX - size / 2;
      targetY = clientY - size / 2;
      const maxX = window.innerWidth - size;
      const maxY = window.innerHeight - size;
      targetX = clamp(targetX, 0, maxX);
      targetY = clamp(targetY, 0, maxY);
    }

    window.addEventListener("keydown", (e) => {
      if (isTyping()) {
        if (e.key === "Escape") {
          chatInput.blur();
        }
        return;
      }

      const key = e.key.toLowerCase();

      if (["arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d"].includes(key)) {
        keys[key] = true;
        targetX = x;
        targetY = y;
        e.preventDefault();
      }

      if (e.key === "Enter" && !anyOverlayOpen()) {
        chatInput.focus();
        e.preventDefault();
      }
    });

    window.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    window.addEventListener("resize", renderPlayer);

    document.addEventListener("click", (e) => {
      const clickedUI = e.target.closest(
        "#chatForm, .roundBtn, .iconBtn, .mapBtn, .closeBtn, .mapLink, #friendsPanel, .returnBtn"
      );

      if (clickedUI || anyOverlayOpen()) return;

      setMoveTarget(e.clientX, e.clientY);
      friendsPanel.classList.remove("active");
    });

    chatForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = chatInput.value.trim();
      if (!text) return;

      chatBubble.textContent = text;
      chatBubble.style.display = "block";
      chatInput.value = "";
    });

    homeBtn.addEventListener("click", switchToHome);
    returnToWorldBtn.addEventListener("click", switchToWorld);

    mapOpenBtn.addEventListener("click", openMap);
    mapCloseBtn.addEventListener("click", closeMap);

    socialBtn.addEventListener("click", openSocial);
    socialCloseBtn.addEventListener("click", closeSocial);

    friendsBtn.addEventListener("click", toggleFriends);

    mapOverlay.addEventListener("click", (e) => {
      if (e.target === mapOverlay) closeMap();
    });

    socialOverlay.addEventListener("click", (e) => {
      if (e.target === socialOverlay) closeSocial();
    });

    document.querySelectorAll(".mapLink").forEach((link) => {
      link.addEventListener("click", (e) => {
        e.preventDefault();
        const selected = link.dataset.map;
        chatBubble.textContent = "Selected: " + selected.replace("-", " ");
        chatBubble.style.display = "block";
        closeMap();
      });
    });

    function moveWithKeys(dt) {
      let dx = 0;
      let dy = 0;

      if (keys["arrowup"] || keys["w"]) dy -= 1;
      if (keys["arrowdown"] || keys["s"]) dy += 1;
      if (keys["arrowleft"] || keys["a"]) dx -= 1;
      if (keys["arrowright"] || keys["d"]) dx += 1;

      if (dx === 0 && dy === 0) return false;

      const length = Math.hypot(dx, dy);
      dx /= length;
      dy /= length;

      x += dx * speed * dt;
      y += dy * speed * dt;

      targetX = x;
      targetY = y;
      return true;
    }

    function moveTowardTarget(dt) {
      const dx = targetX - x;
      const dy = targetY - y;
      const distance = Math.hypot(dx, dy);

      if (distance < 1) {
        x = targetX;
        y = targetY;
        return;
      }

      const step = speed * dt;

      if (step >= distance) {
        x = targetX;
        y = targetY;
      } else {
        x += (dx / distance) * step;
        y += (dy / distance) * step;
      }
    }

    let lastTime = performance.now();

    function gameLoop(now) {
      const dt = (now - lastTime) / 1000;
      lastTime = now;

      if (!homePage.classList.contains("active")) {
        const usedKeys = moveWithKeys(dt);
        if (!usedKeys) {
          moveTowardTarget(dt);
        }
        renderPlayer();
      }

      requestAnimationFrame(gameLoop);
    }

    renderPlayer();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
