<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart Test</title>
  <style>
    :root{
      --orange:#ff7000;
      --orange-press:#d95e00;
      --ink:#0b1220;
      --line:rgba(11,18,32,0.12);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:Inter, Arial, sans-serif;
      background:#fff;
      color:var(--ink);
    }

    .header{
      border-bottom:1px solid var(--line);
      padding:14px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      font-family:Georgia, "Times New Roman", serif;
      font-size:28px;
      line-height:1;
    }

    .nav{
      display:flex;
      gap:18px;
      margin-left:auto;
      margin-right:8px;
    }

    .nav a{
      text-decoration:none;
      color:var(--ink);
      font-size:16px;
    }

    .cart-btn{
      width:52px;
      height:52px;
      border:1px solid var(--orange);
      border-radius:14px;
      background:var(--orange);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      position:relative;
      transition:transform .12s ease, background .12s ease, border-color .12s ease;
    }

    .cart-btn:hover{
      transform:translateY(-1px);
      background:var(--orange-press);
      border-color:var(--orange-press);
    }

    .cart-count{
      position:absolute;
      top:6px;
      left:50%;
      transform:translateX(-50%);
      color:#fff;
      font-size:10px;
      font-weight:900;
      line-height:1;
      pointer-events:none;
    }

    .cart-icon{
      width:26px;
      height:26px;
      margin-top:8px;
      stroke:#fff;
      fill:none;
      stroke-width:2.1;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="brand">The MayaNut Company</div>

    <nav class="nav" aria-label="Primary">
      <a href="#">Home</a>
      <a href="#">Buy</a>
      <a href="#">About</a>
      <a href="#">FAQ</a>
      <a href="#">Recipes</a>
    </nav>

    <button class="cart-btn" aria-label="Open cart. 0 items">
      <span class="cart-count">0</span>
      <svg class="cart-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 10h10l-1.4 6H8.4L7 10Z"></path>
        <path d="M9.5 10 12 7.5 14.5 10"></path>
      </svg>
    </button>
  </header>
</body>
</html>
